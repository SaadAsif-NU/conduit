services:
  conduit:
    build: .
    image: conduit:latest
    ports:
      - "8080:8080"
    environment:
      CONDUIT_DATA_DIR: /data
      CONDUIT_LOG_LEVEL: INFO
      # Configure real providers by passing their keys, e.g.:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - conduit-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  conduit-data:
